# Hytale server files are downloaded by the backend's internal downloader before
# Ansible runs. The backend ensures HytaleServer.jar (and assets) are present in
# hytale_server_files_dir on the Proxmox Game Deployer host. Ansible only copies
# them into the VM.
#
# - If the Proxmox template already has HytaleServer.jar, we skip the copy.
# - Otherwise we copy from hytale_server_files_dir (always set by the backend).
- name: Ensure Hytale directory exists (already done in hytale_base)
  file:
    path: "{{ hytale_dir }}"
    state: directory
    owner: "{{ hytale_user }}"
    group: "{{ hytale_user }}"
    mode: "0755"

- name: Check if HytaleServer.jar exists in VM
  stat:
    path: "{{ hytale_dir }}/HytaleServer.jar"
  register: hytale_jar_stat

- name: Copy Hytale server files from deployer host cache to VM
  when: not hytale_jar_stat.stat.exists
  copy:
    src: "{{ hytale_server_files_dir }}/"
    dest: "{{ hytale_dir }}/"
    owner: "{{ hytale_user }}"
    group: "{{ hytale_user }}"
    mode: "0644"

- name: Re-check if HytaleServer.jar exists after copy
  when: not hytale_jar_stat.stat.exists
  stat:
    path: "{{ hytale_dir }}/HytaleServer.jar"
  register: hytale_jar_stat_after

- name: Fail if HytaleServer.jar is still missing
  when:
    - not hytale_jar_stat.stat.exists
    - hytale_jar_stat_after.stat.exists is not defined or not hytale_jar_stat_after.stat.exists
  fail:
    msg: >
      HytaleServer.jar NOT FOUND in {{ hytale_dir }}.
      The backend should have populated {{ hytale_server_files_dir }} before Ansible.
      Check Hytale downloader auth at /hytale/auth (downloader scope) and service logs.
